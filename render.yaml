services:
  - type: web
    name: crowd-monitoring-backend
    env: python
    rootDir: crowd_monitoring_system
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
